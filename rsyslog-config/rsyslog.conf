# Minimal rsyslog config for the DevOps stack.
# Receives syslog messages over UDP and TCP on port 514,
# and writes them to /var/log/remote.log so Logstash (file input) can read them.

module(load="imuxsock")   # local system logging support
module(load="imklog")     # kernel logging support

module(load="imudp")
input(type="imudp" port="514")

module(load="imtcp")
input(type="imtcp" port="514")

# Template to format log lines consistently (timestamp, host, tag, message)
template(name="RemoteFormat" type="string"
    string="%timegenerated% %hostname% %syslogtag%%msg%\n"
)

# Write everything received to a single file that Logstash watches
*.* action(type="omfile" file="/var/log/remote.log" template="RemoteFormat")

# Also keep messages visible in container stdout (useful for `docker logs`)
*.* action(type="omfile" file="/dev/stdout")
