version: '3.8'

networks:
  devops-project_app-network:
    driver: bridge

volumes:
  pg_master_data:
  pg_slave_data:
  es_data:
  prometheus_data:
  grafana_data:

services:

  # 1. LOAD BALANCER
  haproxy:
    image: haproxy:2.8
    container_name: haproxy
    ports:
      - "8082:80"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    networks:
      - devops-project_app-network
    depends_on:
      - tomcat1
      - tomcat2

  # 2. APPLICATION STACK
  tomcat1:
    image: tomcat:9.0.83-jdk11-corretto
    container_name: tomcat1
    ports:
      - "8080:8080"
    networks:
      - devops-project_app-network
    environment:
      - DB_HOST=pgpool
      - DB_PORT=5432
      - DB_NAME=mydb
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
    volumes:
      - ./test-app/target/visitor-app:/usr/local/tomcat/webapps/ROOT
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        tag: "tomcat1"
    depends_on:
      - rsyslog

  tomcat2:
    image: tomcat:9.0.83-jdk11-corretto
    container_name: tomcat2
    ports:
      - "8081:8080"
    networks:
      - devops-project_app-network
    environment:
      - DB_HOST=pgpool
      - DB_PORT=5432
      - DB_NAME=mydb
      - DB_USER=postgres
      - DB_PASSWORD=mysecretpassword
    volumes:
      - ./test-app/target/visitor-app:/usr/local/tomcat/webapps/ROOT
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        tag: "tomcat2"
    depends_on:
      - rsyslog

  # 3. DATABASE REPLICATION (Direct Official Postgres 15 Setup - NO PGPOOL TO CRASH)
  pg-master:
    image: postgres:15-alpine
    container_name: pg-master
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=mydb
    volumes:
      - pg_master_data:/var/lib/postgresql/data
    networks:
      - devops-project_app-network
    logging:
      driver: syslog
      options:
        syslog-address: "udp://127.0.0.1:514"
        tag: "postgres-master"

  pg-slave:
    image: postgres:15-alpine
    container_name: pg-slave
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=mysecretpassword
      - POSTGRES_DB=mydb
    volumes:
      - pg_slave_data:/var/lib/postgresql/data
    networks:
      - devops-project_app-network
    depends_on:
      - pg-master

  pgpool:
    image: mrgreen007/pgpool:4.6.4        # Bitnami-compatible, works on amd64 & arm64
    container_name: pgpool
    ports:
      - "5432:5432"
    environment:
      - PGPOOL_BACKEND_NODES=0:pg-master:5432,1:pg-slave:5432
      - PGPOOL_SR_CHECK_USER=postgres
      - PGPOOL_SR_CHECK_PASSWORD=mysecretpassword
      - PGPOOL_POSTGRES_USERNAME=postgres           # ✅ correct var name
      - PGPOOL_POSTGRES_PASSWORD=mysecretpassword   # ✅ correct var name
      - PGPOOL_ADMIN_USERNAME=admin                 # ✅ required — was missing
      - PGPOOL_ADMIN_PASSWORD=adminpassword         # ✅ required — was missing
      - PGPOOL_ENABLE_LOAD_BALANCING=yes
    networks:
      - devops-project_app-network
    depends_on:
      - pg-master
      - pg-slave  # 4. LOGGING PIPELINE (Using super light universal alpine rsyslog)

  rsyslog:
    image: jumanjiman/rsyslog:latest
    container_name: rsyslog
    ports:
      - "514:514/udp"
      - "514:514/tcp"
    volumes:
      - ./rsyslog-config/rsyslog.conf:/etc/rsyslogd.conf:ro
      - ./logs:/var/log
    networks:
      - devops-project_app-network
  
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.17.10
    container_name: elasticsearch
    ports:
      - "9200:9200"    # ← this line is MISSING in your compose
      - "9300:9300"
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - devops-project_app-network

  logstash:
    image: docker.elastic.co/logstash/logstash:7.17.10
    container_name: logstash
    volumes:
      - ./logs:/var/log/host-logs:ro
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    networks:
      - devops-project_app-network
    depends_on:
      - elasticsearch
      - rsyslog

  kibana:
    image: docker.elastic.co/kibana/kibana:7.17.10
    container_name: kibana
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    networks:
      - devops-project_app-network
    depends_on:
      - elasticsearch

  # 5. MONITORING PIPELINE
  open

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - devops-project_app-network

  grafana:
    image: grafana/grafana:10.0.3
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - devops-project_app-network