global
    daemon
    maxconn 256
    log stdout format raw local0

defaults
    mode http
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    log global
    option httplog

frontend http_front
    bind *:80
    default_backend tomcat_back

backend tomcat_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200-404
    option log-health-checks
    server tomcat1 tomcat1:8080 check
    server tomcat2 tomcat2:8080 check

frontend stats
    bind *:8404
    http-request use-service prometheus-exporter if { path /metrics }
    stats enable
    stats uri /stats
    stats refresh 10s
    stats auth admin:admin
